<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Massas Valaretto</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .animate-bounce-subtle { animation: bounce-subtle 3s infinite ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componentes auxiliares para suportar a nomenclatura customizada da imagem
        const Eu = ({ nomeDaClasse, ...props }) => <i className={nomeDaClasse} {...props} />;
        const Extensao = ({ nomeDaClasse, ...props }) => <span className={nomeDaClasse} {...props} />;
        const Imagem = ({ nomeDaClasse, ...props }) => <img className={nomeDaClasse} {...props} />;
        const Bloco = ({ nomeDaClasse, ...props }) => <div className={nomeDaClasse} {...props} />;

        const LINK_DO_WHATSAPP = "https://wa.me/5517981130555";

        const categorias = [
            { ia: 'all', nome: 'Todos' },
            { ia: 'esfihas', nome: 'Esfihas' },
            { ia: 'empadas', nome: 'Empadas' },
            { ia: 'tortas', nome: 'Tortas' },
            { ia: 'massas-lisas', nome: 'Massas' },
            { ia: 'recheadas', nome: 'Recheadas' }
        ];

        const products = [
            // Esfihas
            { ia: 1, categoria: 'esfihas', nome: 'Esfiha de Carne (Fechada)', peso: '500g', preço: 29.90, descrição: 'Massa leve e recheio suculento.', imagem: './produtos/esfiha_de_carne_fechada.PNG' },
            { ia: 2, categoria: 'esfihas', nome: 'Esfiha de Carne (Aberta)', peso: '500g', preço: 29.90, descrição: 'A clássica aberta com tempero especial.', imagem: './produtos/esfiha_de_carne_aberta.png' },
            { ia: 3, categoria: 'esfihas', nome: 'Esfiha de Escarola', peso: '500g', preço: 29.90, descrição: 'Escarola fresca com tempero da casa.', imagem: './produtos/esfiha_de_escarola.png' },
            { ia: 4, categoria: 'esfihas', nome: 'Esfiha de Frango c/ Requeijão', peso: '500g', preço: 29.90, descrição: 'Frango desfiado com requeijão cremoso.', imagem: './produtos/esfiha_de_frango_com_requeijao.png' },
            { ia: 5, categoria: 'esfihas', nome: 'Esfiha de Queijo', peso: '500g', preço: 29.90, descrição: 'Mix de queijos selecionados.', imagem: './produtos/esfiha_de_queijo.png' },

            // Empadas
            { ia: 6, categoria: 'empadas', nome: 'Empada de Frango c/ Requeijão', peso: '500g', preço: 39.90, descrição: 'Massa podre que derrete na boca.', imagem: './produtos/empada_de_frango_com_requeijao.png' },
            { ia: 7, categoria: 'empadas', nome: 'Empada de Palmito', peso: '500g', preço: 39.90, descrição: 'Recheio cremoso de palmito.', imagem: './produtos/empada_de_palmito.png' },

            // Tortas
            { ia: 8, categoria: 'tortas', nome: 'Torta de Frango c/ Requeijão', peso: '1kg', preço: 59.90, descrição: 'Tamanho família, super recheada.', imagem: './produtos/torta_de_frango_com_requeijao_1kg.png' },
            { ia: 11, categoria: 'tortas', nome: 'Torta de Frango c/ Requeijão', peso: '600g', preço: 38.90, descrição: 'Recheio cremoso, porção média.', imagem: './produtos/torta_de_frango_com_requeijao_600g.png' },

            // Recheadas
            { ia: 19, categoria: 'recheadas', nome: 'Rondelle de Espinafre', peso: '500g', preço: 39.90, descrição: 'Massa verde com recheio especial.', imagem: './produtos/rondelle_de_espinafre.png' },
            { ia: 23, categoria: 'recheadas', nome: 'Canellone Presunto e Mussarela', peso: '500g', preço: 29.90, descrição: 'Tradicional canellone artesanal.', imagem: './produtos/canellone_presunto_e_mussarela.png' },
            { ia: 28, categoria: 'recheadas', nome: 'Sofiatelli de Espinafre', peso: '500g', preço: 39.90, descrição: 'Elegância e sabor no prato.', imagem: './produtos/sofiatelli_de_espinafre.png' },
            { ia: 29, categoria: 'recheadas', nome: 'Sofiatelli de Queijo', peso: '500g', preço: 39.90, descrição: 'Massa delicada recheada com queijo.', imagem: './produtos/sofiatelli_de_queijo.png' },
            { ia: 30, categoria: 'recheadas', nome: 'Sofiatelli Quatro Queijos', peso: '500g', preço: 39.90, descrição: 'O requinte dos quatro queijos.', imagem: './produtos/sofiatelli_quatro_queijos.png' },
        ];

        const CartaoDoProduto = ({ produto }) => {
            const [erroDeImagem, setImgError] = useState(false);

            const enviarPedido = () => {
                const mensagem = encodeURIComponent(`Olá! Gostaria de encomendar: ${produto.nome} (${produto.peso}) - R$ ${produto.preço.toFixed(2).replace('.', ',')}`);
                window.open(`${LINK_DO_WHATSAPP}?text=${mensagem}`, '_blank');
            };

            return (
                <Bloco nomeDaClasse="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow group">
                    <Bloco nomeDaClasse="h-48 bg-gray-50 flex items-center justify-center relative overflow-hidden">
                        {produto.imagem && !erroDeImagem ? (
                            <Imagem 
                                src={produto.imagem} 
                                alt={produto.nome}
                                nomeDaClasse="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                                onError={() => setImgError(true)}
                            />
                        ) : (
                            <Bloco nomeDaClasse="text-gray-300 flex flex-col items-center">
                                <Eu nomeDaClasse="fas fa-utensils text-4xl mb-2" />
                                <Extensao nomeDaClasse="text-[10px] uppercase font-bold">Sem Foto</Extensao>
                            </Bloco>
                        )}
                        <Bloco nomeDaClasse="absolute top-3 right-3 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-bold text-green-700 shadow-sm">
                            {produto.peso}
                        </Bloco>
                    </Bloco>
                    <Bloco nomeDaClasse="p-5">
                        <h3 className="text-gray-800 font-bold text-lg mb-1 leading-tight">{produto.nome}</h3>
                        <p className="text-gray-500 text-sm mb-4 h-10 line-clamp-2">{produto.descrição}</p>
                        <Bloco nomeDaClasse="flex items-center justify-between mt-auto">
                            <Bloco>
                                <Extensao nomeDaClasse="text-xs text-gray-400 block uppercase font-semibold">Preço</Extensao>
                                <Extensao nomeDaClasse="text-xl font-black text-green-600 text-nowrap">R$ {produto.preço.toFixed(2).replace('.', ',')}</Extensao>
                            </Bloco>
                            <button onClick={enviarPedido} className="bg-green-600 hover:bg-green-700 text-white p-3 rounded-xl transition-all shadow-lg shadow-green-100 flex items-center gap-2 group-hover:scale-105">
                                <Eu nomeDaClasse="fab fa-whatsapp text-xl" />
                                <Extensao nomeDaClasse="text-sm font-bold">Pedir</Extensao>
                            </button>
                        </Bloco>
                    </Bloco>
                </Bloco>
            );
        };

        const App = () => {
            const [categoriaAtiva, setCategoriaAtiva] = useState('all');
            const [termoBusca, setTermoBusca] = useState('');
            const [rolouPagina, setRolouPagina] = useState(false);

            useEffect(() => {
                const aoRolar = () => setRolouPagina(window.scrollY > 50);
                window.addEventListener('scroll', aoRolar);
                return () => window.removeEventListener('scroll', aoRolar);
            }, []);

            const produtosFiltrados = products.filter(p => {
                const categoriaBate = categoriaAtiva === 'all' || p.categoria === categoriaAtiva;
                const buscaBate = p.nome.toLowerCase().includes(termoBusca.toLowerCase());
                return categoriaBate && buscaBate;
            });

            return (
                <Bloco nomeDaClasse="min-h-screen bg-slate-50 font-sans text-gray-900">
                    <header className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${rolouPagina ? 'bg-white/90 backdrop-blur-md shadow-sm py-3' : 'bg-transparent py-6'}`}>
                        <div className="container mx-auto px-4 flex items-center justify-between">
                            <Bloco nomeDaClasse="flex items-center gap-2">
                                <Bloco nomeDaClasse="bg-red-600 p-2 rounded-lg text-white font-black text-xl shadow-lg">MV</Bloco>
                                <Bloco>
                                    <h1 className={`font-black tracking-tight leading-none ${rolouPagina ? 'text-lg' : 'text-2xl'} transition-all`}>
                                        Massas <span className="text-red-600">Valaretto</span>
                                    </h1>
                                    {!rolouPagina && <Extensao nomeDaClasse="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Qualidade Premium</Extensao>}
                                </Bloco>
                            </Bloco>
                            <a href={LINK_DO_WHATSAPP} className="bg-green-600 text-white px-5 py-2 rounded-full hover:bg-green-700 transition shadow-lg flex items-center gap-2">
                                <Eu nomeDaClasse="fas fa-phone-alt" /> <Extensao nomeDaClasse="hidden md:inline">Contato</Extensao>
                            </a>
                        </div>
                    </header>

                    <section className="relative pt-32 pb-16 bg-white overflow-hidden">
                        <div className="container mx-auto px-4">
                            <div className="max-w-2xl">
                                <h2 className="text-4xl md:text-6xl font-black text-gray-900 mb-6 leading-tight">
                                    Massas Frescas <br/><span className="text-green-600">Artesanais</span>
                                </h2>
                                <Bloco nomeDaClasse="relative max-w-md">
                                    <Eu nomeDaClasse="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" />
                                    <input 
                                        type="text" 
                                        placeholder="O que você deseja hoje?"
                                        className="w-full pl-12 pr-4 py-4 bg-gray-100 border-none rounded-2xl focus:ring-2 focus:ring-green-500 transition-all font-medium"
                                        value={termoBusca}
                                        onChange={(e) => setTermoBusca(e.target.value)}
                                    />
                                </Bloco>
                            </div>
                        </div>
                    </section>

                    <div className="sticky top-[64px] md:top-[80px] z-40 bg-white border-y border-gray-100 shadow-sm overflow-hidden">
                        <div className="container mx-auto px-4">
                            <div className="flex overflow-x-auto py-4 gap-3 no-scrollbar items-center">
                                {categorias.map((cat) => (
                                    <button
                                        key={cat.ia}
                                        onClick={() => setCategoriaAtiva(cat.ia)}
                                        className={`whitespace-nowrap px-6 py-2 rounded-full text-sm font-bold transition-all ${
                                            categoriaAtiva === cat.ia 
                                                ? 'bg-green-600 text-white shadow-lg' 
                                                : 'bg-gray-100 text-gray-500 hover:bg-gray-200'
                                        }`}
                                    >
                                        {cat.nome}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    <main className="container mx-auto px-4 py-12">
                        {produtosFiltrados.length > 0 ? (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                                {produtosFiltrados.map(p => (
                                    <CartaoDoProduto key={p.ia} produto={p} />
                                ))}
                            </div>
                        ) : (
                            <Bloco nomeDaClasse="text-center py-20 text-gray-400">
                                <Eu nomeDaClasse="fas fa-search text-5xl mb-4" />
                                <p className="font-bold">Nenhum produto encontrado.</p>
                            </Bloco>
                        )}
                    </main>

                    <footer className="bg-gray-900 text-white pt-16 pb-10">
                        <div className="container mx-auto px-4">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-12 mb-10">
                                <Bloco>
                                    <Bloco nomeDaClasse="flex items-center gap-2 mb-4">
                                        <Bloco nomeDaClasse="bg-red-600 p-2 rounded-lg font-black">MV</Bloco>
                                        <h2 className="text-xl font-black">Massas Valaretto</h2>
                                    </Bloco>
                                    <p className="text-gray-400 text-sm">O sabor da tradição em cada massa fresca que produzimos.</p>
                                </Bloco>
                                <Bloco>
                                    <h4 className="font-bold mb-4 flex items-center gap-2"><Eu nomeDaClasse="far fa-clock text-green-500" /> Horários</h4>
                                    <ul className="text-sm text-gray-400 space-y-2">
                                        <li>Segunda: <span className="text-red-500">Fechado</span></li>
                                        <li>Terça - Sexta: 07h às 19h</li>
                                        <li>Sábado: 07h às 16h</li>
                                        <li>Domingo: 07h às 14h</li>
                                    </ul>
                                </Bloco>
                                <Bloco>
                                    <h4 className="font-bold mb-4 flex items-center gap-2"><Eu nomeDaClasse="fas fa-map-marker-alt text-green-500" /> Contato</h4>
                                    <p className="text-sm text-gray-400">Telefone: 17 3224.3944</p>
                                    <p className="text-sm text-gray-400">WhatsApp: 17 98113.0555</p>
                                </Bloco>
                            </div>
                        </div>
                    </footer>

                    <a href={LINK_DO_WHATSAPP} className="fixed bottom-6 right-6 z-50 bg-green-500 text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform animate-bounce-subtle">
                        <Eu nomeDaClasse="fab fa-whatsapp text-3xl" />
                    </a>
                </Bloco>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
