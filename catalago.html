<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Massas Valaretto</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .animate-bounce-subtle { animation: bounce-subtle 3s infinite ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const WHATSAPP_LINK = "https://wa.me/5517981130555";

        const categories = [
            { id: 'all', name: 'Todos' },
            { id: 'esfihas', name: 'Esfihas' },
            { id: 'empadas', name: 'Empadas' },
            { id: 'tortas', name: 'Tortas' },
            { id: 'massas-lisas', name: 'Massas' },
            { id: 'recheadas', name: 'Recheadas' }
        ];

        const products = [
            // Esfihas
            { id: 1, category: 'esfihas', name: 'Esfiha de Carne (Fechada)', weight: '500g', price: 29.90, desc: 'Massa leve e recheio suculento.', image: './produtos/esfiha_de_carne_fechada.PNG' },
            { id: 2, category: 'esfihas', name: 'Esfiha de Carne (Aberta)', weight: '500g', price: 29.90, desc: 'A clássica aberta com tempero especial.', image: './produtos/esfiha_de_carne_aberta.png' },
            { id: 3, category: 'esfihas', name: 'Esfiha de Escarola', weight: '500g', price: 29.90, desc: 'Escarola fresca com tempero da casa.', image: './produtos/esfiha_de_escarola.png' },
            { id: 4, category: 'esfihas', name: 'Esfiha de Frango c/ Requeijão', weight: '500g', price: 29.90, desc: 'Frango desfiado com requeijão cremoso.', image: './produtos/esfiha_de_frango_com_requeijao.png' },
            { id: 5, category: 'esfihas', name: 'Esfiha de Queijo', weight: '500g', price: 29.90, desc: 'Mix de queijos selecionados.', image: './produtos/esfiha_de_queijo.png' },

            // Empadas
            { id: 6, category: 'empadas', name: 'Empada de Frango c/ Requeijão', weight: '500g', price: 39.90, desc: 'Massa podre que derrete na boca.', image: './produtos/empada_de_frango_com_requeijao.png' },
            { id: 7, category: 'empadas', name: 'Empada de Palmito', weight: '500g', price: 39.90, desc: 'Recheio cremoso de palmito.', image: './produtos/empada_de_palmito.png' },

            // Tortas 1kg
            { id: 8, category: 'tortas', name: 'Torta de Frango c/ Requeijão', weight: '1kg', price: 59.90, desc: 'Tamanho família, super recheada.', image: './produtos/torta_de_frango_com_requeijao_1kg.png' },
            { id: 9, category: 'tortas', name: 'Torta de Palmito', weight: '1kg', price: 59.90, desc: 'O sabor tradicional em 1kg.', image: './produtos/torta_de_palmito_1kg.png' },
            { id: 10, category: 'tortas', name: 'Torta de Escarola', weight: '1kg', price: 59.90, desc: 'Escarola com tempero suave.', image: './produtos/torta_de_escarola_1kg.png' },

            // Tortas 600g
            { id: 11, category: 'tortas', name: 'Torta de Frango c/ Requeijão', weight: '600g', price: 38.90, desc: 'Recheio cremoso, porção média.', image: './produtos/torta_de_frango_com_requeijao_600g.png' },
            { id: 12, category: 'tortas', name: 'Torta de Palmito', weight: '600g', price: 38.90, desc: 'Palmito selecionado, porção média.', image: './produtos/torta_de_palmito_600g.png' },
            { id: 13, category: 'tortas', name: 'Torta de Escarola', weight: '600g', price: 38.90, desc: 'Deliciosa e leve, porção média.', image: './produtos/torta_de_escarola_600g.png' },

            // Massas Lisas
            { id: 14, category: 'massas-lisas', name: 'Massa para Lasanha e Canellone', weight: '500g', price: 8.90, desc: 'Massa fresca, direto para o forno.', image: './produtos/massa_para_lasanha_e_canellone.png' },
            { id: 15, category: 'massas-lisas', name: 'Massa para Pastel (Disco)', weight: '500g', price: 8.90, desc: 'Praticidade para seus pastéis.', image: './produtos/massa_para_pastel_disco_500g.png' },
            { id: 16, category: 'massas-lisas', name: 'Massa para Pastel (Rolo 1kg)', weight: '1kg', price: 13.90, desc: 'Crocante e sequinha.', image: './produtos/massa_para_pastel_rolo_1kg.png' },
            { id: 17, category: 'massas-lisas', name: 'Massa para Pastel (Rolo 500g)', weight: '500g', price: 8.50, desc: 'Massa fresca em rolo.', image: './produtos/massa_para_pastel_rolo_500g.png' },
            { id: 18, category: 'massas-lisas', name: 'Nhoque de Batata Tradicional', weight: '500g', price: 12.90, desc: 'Massa de batata legítima.', image: './produtos/nhoque_de_batata_tradicional.png' },

            // Recheadas - Rondelle
            { id: 19, category: 'recheadas', name: 'Rondelle de Espinafre', weight: '500g', price: 39.90, desc: 'Massa verde com recheio especial.', image: './produtos/rondelle_de_espinafre.png' },
            { id: 20, category: 'recheadas', name: 'Rondelle Frango c/ Requeijão', weight: '500g', price: 29.90, desc: 'Massa fresca recheada.', image: './produtos/rondelle_frango_com_requeijao.png' },
            { id: 21, category: 'recheadas', name: 'Rondelle Presunto e Mussarela', weight: '500g', price: 29.90, desc: 'O favorito das crianças.', image: './produtos/rondelle_presunto_e_mussarela.png' },
            { id: 22, category: 'recheadas', name: 'Rondelle Quatro Queijos', weight: '500g', price: 29.90, desc: 'Para amantes de queijo.', image: './produtos/rondelle_quatro_queijos.png' },

            // Recheadas - Canellone
            { id: 23, category: 'recheadas', name: 'Canellone Presunto e Mussarela', weight: '500g', price: 29.90, desc: 'Tradicional canellone artesanal.', image: './produtos/canellone_presunto_e_mussarela.png' },
            { id: 24, category: 'recheadas', name: 'Canellone Quatro Queijos', weight: '500g', price: 29.90, desc: 'Massa recheada com mix de queijos.', image: './produtos/canellone_quatro_queijos.png' },

            // Recheadas - Conchiglione
            { id: 25, category: 'recheadas', name: 'Conchiglione Frango c/ Requeijão', weight: '500g', price: 39.90, desc: 'Formato de concha, muito recheio.', image: './produtos/conchiglione_frango_com_requeijao.png' },
            { id: 26, category: 'recheadas', name: 'Conchiglione Presunto e Mussarela', weight: '500g', price: 39.90, desc: 'Massa em formato de concha recheada.', image: './produtos/conchiglione_presunto_e_mussarela.png' },
            { id: 27, category: 'recheadas', name: 'Conchiglione Quatro Queijos', weight: '500g', price: 39.90, desc: 'Sabor intenso de queijos.', image: './produtos/conchiglione_quatro_queijos.png' },

            // Recheadas - Sofiatelli
            { id: 28, category: 'recheadas', name: 'Sofiatelli de Espinafre', weight: '500g', price: 39.90, desc: 'Elegância e sabor no prato.', image: './produtos/sofiatelli_de_espinafre.png' },
            { id: 29, category: 'recheadas', name: 'Sofiatelli de Queijo', weight: '500g', price: 39.90, desc: 'Massa delicada recheada com queijo.', image: './produtos/sofiatelli_de_queijo.png' },
            { id: 30, category: 'recheadas', name: 'Sofiatelli Quatro Queijos', weight: '500g', price: 39.90, desc: 'O requinte dos quatro queijos.', image: './produtos/sofiatelli_quatro_queijos.png' },
        ];

        const ProductCard = ({ product }) => {
            const [imgError, setImgError] = useState(false);

            const sendOrder = () => {
                const message = encodeURIComponent(`Olá! Gostaria de encomendar: ${product.name} (${product.weight}) - R$ ${product.price.toFixed(2).replace('.', ',')}`);
                window.open(`${WHATSAPP_LINK}?text=${message}`, '_blank');
            };

            return (
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow group">
                    <div className="h-48 bg-gray-50 flex items-center justify-center relative overflow-hidden">
                        {product.image && !imgError ? (
                            <img 
                                src={product.image} 
                                alt={product.name}
                                className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                                onError={() => setImgError(true)}
                            />
                        ) : (
                            <div className="text-gray-300 flex flex-col items-center">
                                <i className="fas fa-utensils text-4xl mb-2"></i>
                                <span className="text-[10px] uppercase font-bold">Sem Foto</span>
                            </div>
                        )}
                        <div className="absolute top-3 right-3 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-bold text-green-700 shadow-sm">
                            {product.weight}
                        </div>
                    </div>
                    <div className="p-5">
                        <h3 className="text-gray-800 font-bold text-lg mb-1 leading-tight">{product.name}</h3>
                        <p className="text-gray-500 text-sm mb-4 h-10 line-clamp-2">{product.desc}</p>
                        <div className="flex items-center justify-between mt-auto">
                            <div>
                                <span className="text-xs text-gray-400 block uppercase font-semibold">Preço</span>
                                <span className="text-xl font-black text-green-600 text-nowrap">R$ {product.price.toFixed(2).replace('.', ',')}</span>
                            </div>
                            <button onClick={sendOrder} className="bg-green-600 hover:bg-green-700 text-white p-3 rounded-xl transition-all shadow-lg shadow-green-100 flex items-center gap-2 group-hover:scale-105">
                                <i className="fab fa-whatsapp text-xl"></i>
                                <span className="text-sm font-bold">Pedir</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeCategory, setActiveCategory] = useState('all');
            const [searchTerm, setSearchTerm] = useState('');
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const filteredProducts = products.filter(p => {
                const matchesCategory = activeCategory === 'all' || p.category === activeCategory;
                const matchesSearch = p.name.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-gray-900">
                    <header className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'bg-white/90 backdrop-blur-md shadow-sm py-3' : 'bg-transparent py-6'}`}>
                        <div className="container mx-auto px-4 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-red-600 p-2 rounded-lg text-white font-black text-xl shadow-lg">MV</div>
                                <div>
                                    <h1 className={`font-black tracking-tight leading-none ${scrolled ? 'text-lg' : 'text-2xl'} transition-all`}>
                                        Massas <span className="text-red-600">Valaretto</span>
                                    </h1>
                                    {!scrolled && <p className="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Qualidade Premium</p>}
                                </div>
                            </div>
                            <a href={WHATSAPP_LINK} className="bg-green-600 text-white px-5 py-2 rounded-full hover:bg-green-700 transition shadow-lg flex items-center gap-2">
                                <i className="fas fa-phone-alt"></i> <span className="hidden md:inline">Contato</span>
                            </a>
                        </div>
                    </header>

                    <section className="relative pt-32 pb-16 bg-white overflow-hidden">
                        <div className="container mx-auto px-4">
                            <div className="max-w-2xl">
                                <h2 className="text-4xl md:text-6xl font-black text-gray-900 mb-6 leading-tight">
                                    Massas Frescas <br/><span className="text-green-600">Artesanais</span>
                                </h2>
                                <div className="relative max-w-md">
                                    <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                    <input 
                                        type="text" 
                                        placeholder="O que você deseja hoje?"
                                        className="w-full pl-12 pr-4 py-4 bg-gray-100 border-none rounded-2xl focus:ring-2 focus:ring-green-500 transition-all font-medium"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                            </div>
                        </div>
                    </section>

                    <div className="sticky top-[64px] md:top-[80px] z-40 bg-white border-y border-gray-100 shadow-sm overflow-hidden">
                        <div className="container mx-auto px-4">
                            <div className="flex overflow-x-auto py-4 gap-3 no-scrollbar items-center">
                                {categories.map((cat) => (
                                    <button
                                        key={cat.id}
                                        onClick={() => setActiveCategory(cat.id)}
                                        className={`whitespace-nowrap px-6 py-2 rounded-full text-sm font-bold transition-all ${
                                            activeCategory === cat.id 
                                                ? 'bg-green-600 text-white shadow-lg' 
                                                : 'bg-gray-100 text-gray-500 hover:bg-gray-200'
                                        }`}
                                    >
                                        {cat.name}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    <main className="container mx-auto px-4 py-12">
                        {filteredProducts.length > 0 ? (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                                {filteredProducts.map(product => (
                                    <ProductCard key={product.id} product={product} />
                                ))}
                            </div>
                        ) : (
                            <div className="text-center py-20 text-gray-400">
                                <i className="fas fa-search text-5xl mb-4"></i>
                                <p className="font-bold">Nenhum produto encontrado.</p>
                            </div>
                        )}
                    </main>

                    <footer className="bg-gray-900 text-white pt-16 pb-10">
                        <div className="container mx-auto px-4">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-12 mb-10">
                                <div>
                                    <div className="flex items-center gap-2 mb-4">
                                        <div className="bg-red-600 p-2 rounded-lg font-black">MV</div>
                                        <h2 className="text-xl font-black">Massas Valaretto</h2>
                                    </div>
                                    <p className="text-gray-400 text-sm">O sabor da tradição em cada massa fresca que produzimos.</p>
                                </div>
                                <div>
                                    <h4 className="font-bold mb-4 flex items-center gap-2"><i className="far fa-clock text-green-500"></i> Horários</h4>
                                    <ul className="text-sm text-gray-400 space-y-2">
                                        <li>Segunda: <span className="text-red-500">Fechado</span></li>
                                        <li>Terça - Sexta: 07h às 19h</li>
                                        <li>Sábado: 07h às 16h</li>
                                        <li>Domingo: 07h às 14h</li>
                                    </ul>
                                </div>
                                <div>
                                    <h4 className="font-bold mb-4 flex items-center gap-2"><i className="fas fa-map-marker-alt text-green-500"></i> Contato</h4>
                                    <p className="text-sm text-gray-400">Telefone: 17 3224.3944</p>
                                    <p className="text-sm text-gray-400">WhatsApp: 17 98113.0555</p>
                                </div>
                            </div>
                        </div>
                    </footer>

                    <a href={WHATSAPP_LINK} className="fixed bottom-6 right-6 z-50 bg-green-500 text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform animate-bounce-subtle">
                        <i className="fab fa-whatsapp text-3xl"></i>
                    </a>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
